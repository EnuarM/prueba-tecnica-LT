version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: banking-platform-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: banking_platform
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./apps/backend/gateway
      dockerfile: Dockerfile
    container_name: banking-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      CUSTOMER_SERVICE_URL: http://customer-service:3001
      PRODUCT_REQUESTS_URL: http://product-requests:3002
    depends_on:
      - customer-service
      - product-requests

  customer-service:
    build:
      context: ./apps/backend/customer-service
      dockerfile: Dockerfile
    container_name: banking-customer-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001

  product-requests:
    build:
      context: ./apps/backend/product-requests
      dockerfile: Dockerfile
    container_name: banking-product-requests
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGODB_URI: mongodb://root:secret@mongodb:27017/banking_platform?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local

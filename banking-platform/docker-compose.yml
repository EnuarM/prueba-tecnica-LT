services:
  mongodb:
    image: mongo:7
    container_name: banking-platform-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: banking_platform
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./apps/backend/api-gateway
      dockerfile: Dockerfile
    container_name: banking-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: c3VwZXItc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktY2hhbmdlLWluLXByb2R1Y3Rpb24tMzJjaGFycw==
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8000}
      AUTH_SERVICE_URL: http://authentication-service:3001
      PRODUCT_REQUESTS_URL: http://product-requests:3002
    depends_on:
      - authentication-service
      - product-requests

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:3000/graphql}
    container_name: banking-frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
    depends_on:
      - gateway

  authentication-service:
    build:
      context: ./apps/backend/authentication-service
      dockerfile: Dockerfile
    container_name: banking-authentication-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      JWT_SECRET: c3VwZXItc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktY2hhbmdlLWluLXByb2R1Y3Rpb24tMzJjaGFycw==
      JWT_EXPIRES_IN: 1h
      MULESOFT_BASE_URL: https://df55ea6a-84ee-4da6-b351-218b8bdaf47e.mock.pstmn.io

  product-requests:
    build:
      context: ./apps/backend/product-requests
      dockerfile: Dockerfile
    container_name: banking-product-requests
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: mongodb://root:secret@mongodb:27017/banking_platform?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
